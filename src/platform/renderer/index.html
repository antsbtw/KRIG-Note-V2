<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      L5-B3.5 / L5-B3.6 CSP 调整:
      - img-src:'self' / data:(fallback)/ media:(本地文件协议)/ https:(Embed link 外链)
      - connect-src:'self' / media:(SVG 走 fetch/XHR 加载文本,需要明确允许 media://)
        SVG block 走 DOM innerHTML 路径(替代 <img>),要求 fetch SVG 文本回来,
        connect-src 默认 'self' 会拦,必须显式加 media:
      - font-src:'self' / data:(KaTeX katex.min.css 含 @font-face url(fonts/...) 字体引用,
        Vite bundle 后字体走 'self';某些字体可能 inline data: URL,加 data: 兜底)
      L5-B3.16 audio/video CSP 调整:
      - media-src:audio / video 元素的 src 默认走 default-src(='self'),不加 media:
        会拦截 media:// 协议的音视频文件(浏览器报"violates default-src" + 0:00/0:00)。
        加 'self' / data: / media: / https:(对应 import 后 mediaStore / data URL fallback /
        URL embed 三种情况)
      - frame-src:videoBlock youtube embed 走 <iframe src="https://www.youtube.com/embed/...">,
        需 frame-src 显式允许 youtube.com(default-src 'self' 会拦)
      L5-B3.18 tweet-block:tweetBlock iframe 走 https://platform.twitter.com/embed/Tweet.html,
        需 frame-src 加 platform.twitter.com 白名单(同上,default-src 'self' 会拦)
      L5-B3.20a learning TTS:learningTts 返 ArrayBuffer,renderer 用 Blob +
        URL.createObjectURL(blob) 喂给 <audio>,产生 blob: URL,需 media-src 加 blob:
      L5-C3 EPUB(foliate-js):EPUB 内容是 zip 解压后由 foliate-js 用
        URL.createObjectURL 生成 blob URL,然后注入 iframe(<foliate-view> 内部
        paginator 创建)。需补:
        - frame-src 加 blob:(否则 iframe blob 被 block,EPUB 加载失败抛
          "Cannot read properties of null (reading 'head')")
        - img-src / style-src / font-src / connect-src 都加 blob:(EPUB 内的
          图片 / 样式表 / 字体也是 blob URL)
      htmlBlock(2026-05-19): NoteView 内嵌 .html 走 iframe.src=media://,
        frame-src 必须加 media:,否则 framing 被 block。media:// 跨 origin 加载
        让 iframe 文档脱离 parent CSP,获得 AI artifact 所需 inline script 能力。
      L5-G7b 字体记名:画板字体改「记名不嵌入」,loadFont 经 IPC(fontReadByName)
        按名拿 ArrayBuffer,不再走 fetch('font://')。故 connect-src 无需 font:(已删)。
      其他(脚本)走严格策略,default-src 仍 'self'
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' blob:; script-src 'self'; img-src 'self' data: media: https: blob:; media-src 'self' data: media: https: blob:; connect-src 'self' media: https: blob:; font-src 'self' data: blob:; frame-src 'self' media: blob: https://www.youtube.com https://www.youtube-nocookie.com https://platform.twitter.com" />
    <title>KRIG Note</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
